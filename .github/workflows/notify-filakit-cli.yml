name: Notify Filakit CLI

on:
  push:
    branches:
      - master
    paths:
      - 'plugins.json'

jobs:
  dispatch:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Filakit CLI update
        run: |
          curl -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.PAT_TOKEN }}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/jeffersongoncalves/filakit-cli/dispatches \
            -d '{"event_type":"update-starterkits"}'
          echo "Dispatched update-starterkits event to filakit-cli"
