name: Validate plugins JSON

on:
  pull_request:
    paths:
      - 'plugins.json'

jobs:
  validate-json:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Validate plugins.json
        run: |
          echo "Validating plugins.json..."

          # Check if file exists
          if [ ! -f "plugins.json" ]; then
            echo "Error: plugins.json file not found"
            exit 1
          fi

          # Validate JSON syntax
          if ! jq empty plugins.json 2>/dev/null; then
            echo "Error: plugins.json contains invalid JSON"
            exit 1
          fi

          # Validate top-level structure
          if ! jq -e '.startkit and .filament and .laravel and .cli and .jetbrains' plugins.json >/dev/null; then
            echo "Error: plugins.json must contain 'startkit', 'filament', 'laravel', 'cli', and 'jetbrains' sections"
            exit 1
          fi

          # Validate startkit has featured and legacy arrays
          if ! jq -e '.startkit.featured and .startkit.legacy' plugins.json >/dev/null; then
            echo "Error: startkit must have 'featured' and 'legacy' arrays"
            exit 1
          fi

          # Validate filament has plugins and collaborator arrays
          if ! jq -e '.filament.plugins and .filament.collaborator' plugins.json >/dev/null; then
            echo "Error: filament must have 'plugins' and 'collaborator' arrays"
            exit 1
          fi

          # Validate all entries have required title and package fields
          INVALID=$(jq -r '
            [
              .startkit.featured[],
              .startkit.legacy[],
              .filament.plugins[],
              .filament.collaborator[],
              .laravel[],
              .cli[],
              .jetbrains[]
            ] | map(select(has("title") and has("package") | not)) | length
          ' plugins.json)

          if [ "$INVALID" != "0" ]; then
            echo "Error: All entries must have 'title' and 'package' fields"
            exit 1
          fi

          echo "✅ plugins.json is valid"
